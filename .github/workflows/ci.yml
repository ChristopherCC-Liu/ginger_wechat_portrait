name: CI

on:
  pull_request:
  push:
    branches: [main, "codex/**"]

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest]
        python-version: ["3.10", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install locked runtime dependencies
        run: python -m pip install --require-hashes -r requirements.lock
      - name: Install package
        run: python -m pip install --no-deps .
      - name: Unit and integration tests
        run: PYTHONDONTWRITEBYTECODE=1 python -B -m unittest discover -s tests -v
      - name: Ruff
        run: |
          python -m pip install "ruff==0.15.6"
          ruff check .
          ruff format --check \
            personal_agent \
            scripts \
            tests/test_canary_arm.py \
            tests/test_ledger_integrity.py \
            tests/test_local_ops_security.py \
            tests/test_model_security.py \
            tests/test_personal_agent.py \
            tests/test_publish_privacy.py \
            tests/test_reader_security.py \
            tests/test_relationship_profile.py \
            tests/test_runtime_construction.py \
            tests/test_runtime_data_plane.py \
            tests/test_runtime_intelligence.py \
            tests/test_runtime_learning.py \
            tests/test_runtime_ops.py \
            tests/test_runtime_pipeline.py \
            tests/test_shadow_replay.py
      - name: Build distributions
        run: |
          python -m pip install "build==1.4.0"
          python -m build
      - name: Wheel smoke test
        run: |
          python -m venv /tmp/ginger-wheel-smoke
          /tmp/ginger-wheel-smoke/bin/pip install --require-hashes -r requirements.lock
          /tmp/ginger-wheel-smoke/bin/pip install --no-deps dist/*.whl
          /tmp/ginger-wheel-smoke/bin/ginger-agent --help
