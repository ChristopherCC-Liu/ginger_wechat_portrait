name: Prerelease

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Validate tag matches package
        run: |
          PACKAGE_VERSION=$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')
          TAG_VERSION=${GITHUB_REF_NAME#v}
          NORMALIZED_TAG=$(printf '%s' "$TAG_VERSION" | sed 's/-rc\./rc/')
          test "$PACKAGE_VERSION" = "$NORMALIZED_TAG"
      - name: Test
        run: |
          python -m pip install --require-hashes -r requirements.lock
          python -m pip install --no-deps .
          PYTHONDONTWRITEBYTECODE=1 python -B -m unittest discover -s tests -v
      - name: Build source release
        run: scripts/build-release.sh "$GITHUB_REF_NAME"
      - name: Publish GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_DIR="dist/release-$GITHUB_REF_NAME"
          gh release create "$GITHUB_REF_NAME" \
            "$RELEASE_DIR"/*.tar.gz "$RELEASE_DIR/SHA256SUMS" \
            --prerelease --generate-notes --verify-tag
